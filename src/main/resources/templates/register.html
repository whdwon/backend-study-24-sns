<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - SNS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: #262626;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #8e8e8e;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 14px;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #a8a8a8;
            background: #fff;
        }

        .error-field {
            border-color: #ed4956 !important;
        }

        .field-error {
            color: #ed4956;
            font-size: 12px;
            margin-top: 4px;
        }

        .error-box {
            background: #fff3f3;
            border: 1px solid #ed4956;
            border-radius: 4px;
            padding: 10px 12px;
            color: #ed4956;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }

        .btn-register {
            width: 100%;
            padding: 10px;
            background: #0095f6;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-register:hover { background: #1877f2; }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .login-box {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #262626;
        }

        .login-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="logo">SNS</div>
    <div class="subtitle">친구들의 사진과 동영상을 보려면 가입하세요.</div>

    <!-- 서버에서 내려온 에러 메시지 -->
    <div class="error-box" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/view/register}" th:object="${registerForm}" method="post">

        <div class="form-group">
            <input
                type="text"
                th:field="*{username}"
                th:classappend="${#fields.hasErrors('username')} ? 'error-field'"
                placeholder="이름"
                autocomplete="name"
            />
            <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <div class="form-group">
            <input
                type="email"
                th:field="*{email}"
                th:classappend="${#fields.hasErrors('email')} ? 'error-field'"
                placeholder="이메일"
                autocomplete="email"
            />
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="form-group">
            <input
                type="password"
                th:field="*{password}"
                th:classappend="${#fields.hasErrors('password')} ? 'error-field'"
                placeholder="비밀번호"
                autocomplete="new-password"
            />
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn-register">가입</button>
    </form>

    <div class="divider">또는</div>

    <div class="login-box">
        계정이 있으신가요? <a th:href="@{/view/login}">로그인</a>
    </div>
</div>

</body>
</html>
