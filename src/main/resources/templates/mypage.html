<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - SNS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
        }

        /* 상단 네비게이션 */
        nav {
            background: #fff;
            border-bottom: 1px solid #dbdbdb;
            padding: 0 20px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #262626;
        }

        .nav-logout form { display: inline; }

        .btn-logout {
            background: none;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #262626;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-logout:hover { background: #fafafa; }

        /* 프로필 영역 */
        .profile-section {
            max-width: 640px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 36px 40px;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .avatar {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-username {
            font-size: 22px;
            font-weight: 300;
            color: #262626;
            margin-bottom: 12px;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-count {
            font-size: 18px;
            font-weight: 600;
            color: #262626;
            display: block;
        }

        .stat-label {
            font-size: 13px;
            color: #8e8e8e;
        }

        /* 정보 카드 */
        .info-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 24px 32px;
            margin-top: 16px;
        }

        .info-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #8e8e8e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #fafafa;
            font-size: 14px;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label {
            color: #8e8e8e;
            width: 80px;
            flex-shrink: 0;
        }

        .info-value {
            color: #262626;
            font-weight: 500;
        }

        /* 로그인 성공 배너 */
        .success-banner {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 16px;
            color: #2e7d32;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<nav>
    <span class="nav-logo">SNS</span>
    <div class="nav-logout">
        <form th:action="@{/view/logout}" method="post">
            <button type="submit" class="btn-logout">로그아웃</button>
        </form>
    </div>
</nav>

<div class="profile-section">

    <!-- 로그인 성공 메시지 -->
    <div class="success-banner">
        ✓ 로그인 성공! 환영합니다, <strong th:text="${username}">username</strong>님.
    </div>

    <!-- 프로필 카드 -->
    <div class="profile-card">
        <!-- 아바타: 이름 첫 글자 -->
        <div class="avatar" th:text="${#strings.substring(username, 0, 1)}">U</div>

        <div class="profile-info">
            <div class="profile-username" th:text="${username}">username</div>
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-count" th:text="${postCount}">0</span>
                    <span class="stat-label">게시물</span>
                </div>
                <div class="stat-item">
                    <span class="stat-count" th:text="${followerCount}">0</span>
                    <span class="stat-label">팔로워</span>
                </div>
                <div class="stat-item">
                    <span class="stat-count" th:text="${followingCount}">0</span>
                    <span class="stat-label">팔로잉</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 계정 정보 -->
    <div class="info-card">
        <h3>계정 정보</h3>
        <div class="info-row">
            <span class="info-label">이름</span>
            <span class="info-value" th:text="${username}">username</span>
        </div>
        <div class="info-row">
            <span class="info-label">이메일</span>
            <span class="info-value" th:text="${email}">email@example.com</span>
        </div>
    </div>

</div>

</body>
</html>
