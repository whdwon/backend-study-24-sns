spring:
  application:
    name: sns

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb # testdb : 데이터베이스 이름
    username: sa
    password:

  h2:
    console:
      enabled: true # true로 설정 시 console로 DB가 잘 만들어졌는지 확인할 수 있습니다.
      path: /h2-console # localhost:8080 뒤에 붙는 URI.

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true     # 실행되는 SQL 쿼리를 콘솔창에 보여줍니다.
    properties:
      hibernate:
        format_sql: true # SQL을 보기 좋게 정렬해줍니다.
    database-platform: org.hibernate.dialect.H2Dialect
